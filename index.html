<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>RSS Reader</title>
  <meta name="theme-color" content="#3b82f6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RSS">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
</head>
<body>

<header>
  <button class="icon-btn" id="menuBtn" title="Kanały RSS" aria-label="Menu">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
  <span class="header-title">&#128225; RSS Reader</span>
  <button class="icon-btn" id="refreshBtn" title="Odśwież" aria-label="Odśwież">
    <svg id="refreshIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
      <path d="M21 3v5h-5"/>
      <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
      <path d="M8 16H3v5"/>
    </svg>
  </button>
</header>

<div class="overlay" id="overlay"></div>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <h2>Kanały RSS</h2>
    <form class="add-feed-form" id="addFeedForm">
      <input type="text" id="feedInput" placeholder="np. tvn24.pl lub URL RSS" autocomplete="off" spellcheck="false">
      <button type="submit" class="btn btn-primary" aria-label="Szukaj / dodaj kanał">+</button>
    </form>
    <div class="discovery-box" id="discoveryBox" style="display:none"></div>
    <ul class="feed-list" id="feedList"></ul>
  </aside>

  <main>
    <div class="filter-bar">
      <span class="filter-label" id="filterLabel">Wszystkie artykuły</span>
      <span class="article-count" id="articleCount"></span>
    </div>
    <div id="articlesContainer"></div>
  </main>
</div>

<div class="toast" id="toast"></div>

<div class="reader-overlay" id="readerOverlay" role="dialog" aria-modal="true" aria-label="Tryb czytnika">
  <div class="reader-toolbar">
    <button class="icon-btn" id="readerClose" aria-label="Wróć">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>
      </svg>
    </button>
    <span class="reader-source" id="readerSource"></span>
    <a class="icon-btn" id="readerExternal" href="#" target="_blank" rel="noopener noreferrer" aria-label="Otwórz w przeglądarce" title="Otwórz w przeglądarce">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
        <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
    </a>
  </div>
  <div class="reader-body" id="readerBody"></div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
